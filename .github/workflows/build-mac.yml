name: Build macOS DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drift-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create or update GitHub Release
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          FILENAME=$(basename "$DMG")
          echo "Uploading $FILENAME"
          if gh release view v1.3.1 &>/dev/null; then
            gh release upload v1.3.1 "$DMG" --clobber
          else
            gh release create v1.3.1 "$DMG" \
              --title "Drift 1.3.1 (macOS)" \
              --notes "**Unsigned build** — on first launch, right-click the .dmg/app and choose **Open** to bypass Gatekeeper." \
              --latest
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
